<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Akhil & Gaayathri | 13.05.2026</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=Montserrat:wght@200;400;600&family=Pinyon+Script&display=swap" rel="stylesheet">

<style>

/* ===== ROOT ===== */
:root {
    --accent:#C34121;
    --primary:#1A2A4E;
    --bg:#F9F6F2;
    --white:#fff;
}

/* ===== GLOBAL ===== */
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:Montserrat;
    background:var(--bg);
    scroll-behavior:smooth;
}

/* ===== NAV ===== */
nav{
    position:fixed;
    width:100%;
    padding:20px 5%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(10px);
    z-index:1000;
}
.logo{font-family:'Cormorant Garamond';font-size:1.8rem;}
.logo span{color:var(--accent);}

.nav-links{
    display:flex;
    gap:30px;
    list-style:none;
}
.nav-links a{
    cursor:pointer;
    font-size:0.8rem;
}
.nav-links a:hover{color:var(--accent);}

.rsvp-btn{
    background:var(--primary);
    color:white;
    padding:10px 25px;
    border:none;
    cursor:pointer;
}

/* ===== PAGES ===== */
.page-sheet{
    display:none;
    min-height:100vh;
    padding-top:100px;
    opacity:0;
    transform:translateY(20px);
}

/* ===== HERO ===== */
.hero{
    display:flex;
    min-height:90vh;
}
.hero-text{flex:1;padding:8%;}
.hero-img{
    flex:1;
    background:url('https://images.unsplash.com/photo-1511285560929-80b456fea0bc?q=80&w=2000') center/cover;
}

.hero-text h1{
    font-family:'Cormorant Garamond';
    font-size:4rem;
}
.hero-text span{color:var(--accent);}

/* ===== CARDS ===== */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:30px;
    padding:50px;
}
.card{
    background:white;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
    transition:0.3s;
}
.card:hover{transform:translateY(-10px);}

/* ===== MAP ===== */
.map{height:400px;margin:30px;}
iframe{width:100%;height:100%;border:none;}

/* ===== FOOTER ===== */
footer{
    text-align:center;
    padding:60px;
    background:var(--primary);
    color:white;
}

/* ===== MOBILE ===== */
@media(max-width:768px){
.hero{flex-direction:column;}
.nav-links{display:none;}
}

</style>

</head>

<body>

<nav>
<div class="logo">A<span>&</span>G</div>
<ul class="nav-links">
<li><a onclick="showSheet('home')">Home</a></li>
<li><a onclick="showSheet('story')">Story</a></li>
<li><a onclick="showSheet('travel')">Travel</a></li>
</ul>
<button class="rsvp-btn" onclick="showSheet('rsvp')">RSVP</button>
</nav>

<!-- HOME -->

<div id="home" class="page-sheet">
<div class="hero">
<div class="hero-text">
<h1>We are getting <span>Married</span></h1>
<p>13 May 2026 • Tirumala</p>
</div>
<div class="hero-img"></div>
</div>

<div class="grid">
<div class="card">
<h3>Ceremony</h3>
<p>9:00 AM - Hampi Hall</p>
</div>
<div class="card">
<h3>Reception</h3>
<p>7:00 PM - Daspalla</p>
</div>
</div>

<div class="map">
<iframe src="https://maps.google.com/maps?q=Hampi%20Functional%20Hall%20Tirumala&output=embed"></iframe>
</div>
</div>

<!-- STORY -->

<div id="story" class="page-sheet">
<div class="grid">
<div class="card">
<h2>Our Story</h2>
<p>From a simple match to forever ❤️</p>
</div>
</div>
</div>

<!-- TRAVEL -->

<div id="travel" class="page-sheet">
<div class="grid">
<div class="card">
<h2>Travel Info</h2>
<p>Hotels, places and help</p>
</div>
</div>
</div>

<!-- RSVP -->

<div id="rsvp" class="page-sheet">
<div class="grid">
<div class="card">
<h2>RSVP</h2>
<input placeholder="Name" style="width:100%;padding:10px;margin-top:10px;">
<button class="rsvp-btn" style="margin-top:10px;width:100%;">Submit</button>
</div>
</div>
</div>

<footer>
<h2>See you there 💍</h2>
</footer>

<script>

function showSheet(id){

const sheets=document.querySelectorAll('.page-sheet');

// fade out
sheets.forEach(s=>{
if(s.style.display==='block'){
s.style.opacity='0';
s.style.transform='translateY(20px)';
}
});

setTimeout(()=>{

// hide all
sheets.forEach(s=>s.style.display='none');

// show target
const t=document.getElementById(id);
t.style.display='block';

setTimeout(()=>{
t.style.transition='all 0.5s ease';
t.style.opacity='1';
t.style.transform='translateY(0)';
},50);

},300);

window.scrollTo(0,0);
}

window.onload=()=>showSheet('home');

</script>

</body>
</html>
